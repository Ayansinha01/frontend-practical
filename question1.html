<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API Example</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .container {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            text-align: left;
        }

        .card h3 {
            margin: 0 0 10px;
        }
    </style>
</head>
<body>

    <h1>Fetch Data from API</h1>
    <button onclick="getData()">Load Data</button>

    <div class="container" id="dataContainer"></div>

    <script>
        async function getData() {
            const container = document.getElementById("dataContainer");
            container.innerHTML = "Loading...";

            try {
                // Public API
                const response = await fetch("https://jsonplaceholder.typicode.com/posts");
                const data = await response.json();

                container.innerHTML = "";

                data.slice(0, 10).forEach(post => {
                    const card = document.createElement("div");
                    card.className = "card";

                    card.innerHTML = `
                        <h3>${post.title}</h3>
                        <p>${post.body}</p>
                    `;

                    container.appendChild(card);
                });

            } catch (error) {
                container.innerHTML = "Error fetching data!";
                console.error(error);
            }
        }
    </script>

</body>
</html>









<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>React Hooks UI</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f7fb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
    width: 300px;
}

button {
    padding: 10px 20px;
    margin-top: 15px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}
</style>
</head>

<body>

<div class="container">
    <h2>Counter</h2>
    <p id="count">0</p>
    <button onclick="increment()">Increment</button>
</div>

<script>
let count = 0;

function increment() {
    count++;
    document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
